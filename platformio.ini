[env:test_template_engine_8266]
platform = espressif8266
board = d1_mini
framework = arduino
; Postmortem jump relocation fix (see ESP8266-LINKER-WORKAROUND.md in arduino-home-assistant)
platform_packages =
    platformio/framework-arduinoespressif8266 @ https://github.com/esp8266/Arduino.git#521ae60a89e64bb0d1eb7a0b7addf620ced5cad3
test_framework = unity
test_build_src = yes

[env:test_template_engine_esp32]
platform = espressif32@5.3.0
board = nodemcu-32s
framework = arduino
test_framework = unity
test_build_src = yes
